# ~/.config/tmux/tmux.conf
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display-message "Config reloading.."
set-option -g mouse on
set -g allow-passthrough on
setw -g monitor-activity on
set -g base-index 1
set -g renumber-windows on
set -g default-terminal "tmux-256color"
set -g escape-time 0
set -g repeat-time 300
# window
unbind '"'
bind '-' splitw -v -c '#{pane_current_path}'
unbind '%'
bind '\' splitw -h -c '#{pane_current_path}'
set -g prefix `
unbind C-b
bind ` send-prefix
bind p last-window
bind Q confirm-before -p "Kill tmux server? (y/n)" kill-server
bind M command-prompt -p "Join pane from window:" "join-pane -s '%%'"
bind w display-popup -E "tmux list-windows -F '#I: #W' | fzf --reverse | cut -d: -f1 | xargs tmux select-window -t"
# copy
setw -g mode-keys vi
bind -r v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# resize pane (enter resize mode with prefix + H/J/K/L, then freely chain directions)
bind H resize-pane -L 5 \; switch-client -T resize
bind J resize-pane -D 5 \; switch-client -T resize
bind K resize-pane -U 5 \; switch-client -T resize
bind L resize-pane -R 5 \; switch-client -T resize
bind -T resize H resize-pane -L 5 \; switch-client -T resize
bind -T resize J resize-pane -D 5 \; switch-client -T resize
bind -T resize K resize-pane -U 5 \; switch-client -T resize
bind -T resize L resize-pane -R 5 \; switch-client -T resize

# bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreknix/tmux-primary-ip'

# config catppucin color
if-shell '[ -f ~/.config/tmux/colors.conf ]' "source-file ~/.config/tmux/colors.conf"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=default,bold]  #S },#{#[bg=default,fg=#{@thm_red},bold]  #S }}"
#set -ga status-left "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
set -ga status-left "#[bg=default,fg=#{@thm_green},bold]  #{pane_current_command} "
#set -ga status-left "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
#set -ga status-left "#[bg=default,fg=#{@thm_blue},bold]   #{=/-10/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay0},none,bold]#{?window_zoomed_flag,|,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow},bold]#{?window_zoomed_flag,  zoom ,}"
set -ga status-left "#[bg=default,fg=#{@thm_flamingo},bold]  #{cpu_percentage} "
set -ga status-left "#[bg=default,fg=#{@thm_pink},bold]  #(~/.config/tmux/plugins/tmux-mem-cpu-load/tmux-mem-cpu-load -i 2 -m 2 | awk \'{print substr($1, 1, 2)}\')%% "

# status right look and feel
set -g status-right-length 100
set -g status-right ""
#set -ga status-right "#[bg=default,fg=#{@thm_flamingo},bold]  #{cpu_percentage} "
#set -ga status-right "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
#set -ga status-right "#[bg=default,fg=#{@thm_pink},bold]  #(~/.config/tmux/plugins/tmux-mem-cpu-load/tmux-mem-cpu-load -i 2 -m 2 | awk \'{print substr($1, 1, 2)}\')%% "
#set -ga status-right "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
set -ga status-right "#[bg=default,fg=#{@thm_mauve},bold] 󰖩 #{primary_ip} "
#set -ga status-right "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
set -ga status-right "#{battery_color_charge_fg}#[bg=default]  #{battery_percentage} "
#set -ga status-right "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
set -ga status-right "#[bg=default,fg=#{@thm_blue},bold] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# Configure Tmux
set -g status-position top
set -g status 2
set -g status-style "bg=default"
set -g status-justify "absolute-centre"
set -g status-format[1] "#[align=left,bg=default,fg=#{@thm_sapphire},bold]  #{s|$HOME|~|:pane_current_path}"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format " #{s|$HOME|~|:pane_current_path} "
setw -g pane-border-style "bg=default,fg=#{@thm_overlay0}"
setw -g pane-active-border-style "bg=default,fg=#{@thm_peach}"
setw -g pane-border-lines double

# window content (number)
set -wg automatic-rename on
set -g automatic-rename-format "window"
set -g window-status-current-format " #I#{?#{!=:#{window_name},window},: #W,} "
set -g window-status-format " #I#{?#{!=:#{window_name},window},: #W,} "

set -g window-status-style "bg=default,fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=default,fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_base}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_base},bold"
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_base},bold"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay0}]|"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
