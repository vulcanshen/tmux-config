# ~/.config/tmux/tmux.conf

# ─── Server / Session Options ─────────────────────────────────────────────
set-option -g mouse on
# Disable wheel-triggered copy mode (use prefix u/d/k/j for scroll instead)
unbind -T root WheelUpPane
unbind -T root WheelDownPane
set -g allow-passthrough on
setw -g monitor-activity on
set -g base-index 1
set -g renumber-windows on
set -g default-terminal "tmux-256color"
set -g escape-time 0
set -g repeat-time 2000
set -g popup-border-style "fg=#fab387"
set -g message-style "bg=#000000,fg=#00ff00,bold"
set -g message-command-style "bg=#000000,fg=#00ff00,bold"
setw -g mode-keys vi

# ─── Prefix ───────────────────────────────────────────────────────────────
set -g prefix `
unbind C-b
bind ` send-prefix

# ─── Cleanup (tmux defaults + previous custom bindings) ───────────────────
unbind '"'
unbind '%'
unbind s
unbind w
unbind v
unbind M
unbind ,
unbind .
unbind r
unbind p
unbind x
unbind D
unbind B
unbind H
unbind J
unbind K
unbind L
unbind -aq -T open
unbind -aq -T resize
unbind -aq -T o-mode
unbind -aq -T s-mode
unbind -aq -T m-mode
unbind -aq -T r-mode
unbind -aq -T rs-mode
unbind -aq -T rn-mode
unbind -aq -T rm-mode

# ─── Split ────────────────────────────────────────────────────────────────
bind '-' splitw -v -c '#{pane_current_path}'
bind '_' splitw -fv -c '#{pane_current_path}'
bind '\' splitw -h -c '#{pane_current_path}'
bind '|' splitw -fh -c '#{pane_current_path}'

# ─── Single-key actions ───────────────────────────────────────────────────
bind t new-window
bind q detach-client -a \; detach-client
bind Q confirm-before -p "Kill tmux server? (y/n)" kill-server
bind c copy-mode
bind ? display-popup -b rounded -w 80% -h 80% -x C -y C -S "fg=#89b4fa" -E "fzf --reverse --prompt='Keybindings: ' < ~/.config/tmux/keybindings.txt"
bind : display-popup -b rounded -w 80% -h 3 -x C -y C -S "fg=#89b4fa" -E "cmd=\$(printf '' | fzf --print-query --prompt=': ' --no-info --bind 'esc:abort' | head -1); [ -n \"\$cmd\" ] && eval \"tmux \$cmd\""

# ─── Scroll Mode (single-key entry, chain in scroll table) ────────────────
bind u send-keys PPage \; switch-client -T scroll
bind d send-keys NPage \; switch-client -T scroll
bind k send-keys M-k \; switch-client -T scroll
bind j send-keys M-j \; switch-client -T scroll
bind G send-keys C-End \; switch-client -T scroll
bind g switch-client -T scroll-g
bind -T scroll u send-keys PPage \; switch-client -T scroll
bind -T scroll d send-keys NPage \; switch-client -T scroll
bind -T scroll k send-keys M-k \; switch-client -T scroll
bind -T scroll j send-keys M-j \; switch-client -T scroll
bind -T scroll G send-keys C-End \; switch-client -T scroll
bind -T scroll g switch-client -T scroll-g
bind -T scroll q display-message ""
bind -T scroll Escape display-message ""
bind -T scroll-g g send-keys C-Home \; switch-client -T scroll

# ─── Copy Mode (vi) ───────────────────────────────────────────────────────
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─── o-mode (open apps) ───────────────────────────────────────────────────
bind o switch-client -T o-mode
bind -T o-mode o resize-pane -Z
bind -T o-mode f display-popup -b rounded -w 100% -h 100% -S "fg=#89b4fa" -d "#{pane_current_path}" -E "spf"
bind -T o-mode k display-popup -b rounded -w 100% -h 100% -S "fg=#89b4fa" -d "#{pane_current_path}" -E "km8"
bind -T o-mode g display-popup -b rounded -w 100% -h 100% -S "fg=#89b4fa" -d "#{pane_current_path}" -E "lazygit"
bind -T o-mode q display-message ""
bind -T o-mode Escape display-message ""

# ─── s-mode (search) ──────────────────────────────────────────────────────
bind s switch-client -T s-mode
bind -T s-mode w display-popup -b rounded -w 50 -x C -y C -S "fg=#89b4fa" -E "tmux list-windows -F '#I: #W' | fzf --reverse | cut -d: -f1 | xargs tmux select-window -t"
bind -T s-mode s run-shell "zsh -c 'source ~/.config/vulcanzsh/into-tmux.zsh && tmux_s_flow' > /dev/null 2>&1"
bind -T s-mode q display-message ""
bind -T s-mode Escape display-message ""

# ─── m-mode (move) ────────────────────────────────────────────────────────
bind m switch-client -T m-mode
bind -T m-mode i display-popup -b rounded -w 50 -x C -y C -S "fg=#89b4fa" -E "tmux list-windows -F '#{?window_active,,#I: #W}' | sed '/^$/d' | fzf --reverse --prompt='Merge pane to: ' | cut -d: -f1 | xargs -I{} tmux join-pane -h -t {}"
bind -T m-mode o break-pane
bind -T m-mode q display-message ""
bind -T m-mode Escape display-message ""

# ─── r-mode (action namespace) ────────────────────────────────────────────
bind r switch-client -T r-mode
bind -T r-mode l source-file "$HOME/.config/tmux/tmux.conf" \; display-message "Config reloading.."
bind -T r-mode s switch-client -T rs-mode
bind -T r-mode n switch-client -T rn-mode
bind -T r-mode m switch-client -T rm-mode
bind -T r-mode q display-message ""
bind -T r-mode Escape display-message ""

# ─── rs-mode (resize, chain hjkl) ─────────────────────────────────────────
bind -T rs-mode h resize-pane -L 5 \; switch-client -T rs-mode
bind -T rs-mode j resize-pane -D 5 \; switch-client -T rs-mode
bind -T rs-mode k resize-pane -U 5 \; switch-client -T rs-mode
bind -T rs-mode l resize-pane -R 5 \; switch-client -T rs-mode
bind -T rs-mode q display-message ""
bind -T rs-mode Escape display-message ""

# ─── rn-mode (rename) ─────────────────────────────────────────────────────
bind -T rn-mode w display-popup -b rounded -h 3 -w 50 -x C -y C -S "fg=#89b4fa" -E "zsh -c 'source ~/.config/vulcanzsh/into-tmux.zsh && tmux_rename_window'"
bind -T rn-mode s display-popup -b rounded -h 3 -w 50 -x C -y C -S "fg=#89b4fa" -E "printf '' | fzf --print-query --prompt='Rename session: ' | head -1 | xargs -I{} tmux rename-session '{}'"
bind -T rn-mode q display-message ""
bind -T rn-mode Escape display-message ""

# ─── rm-mode (remove) ─────────────────────────────────────────────────────
bind -T rm-mode w kill-window
bind -T rm-mode p kill-pane
bind -T rm-mode q display-message ""
bind -T rm-mode Escape display-message ""

# bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @batt_color_charge_primary_tier8 "#94e2d5"
set -g @batt_color_charge_primary_tier7 "#94e2d5"
set -g @batt_color_charge_primary_tier6 "#94e2d5"
set -g @batt_color_charge_primary_tier5 "#94e2d5"
set -g @batt_color_charge_primary_tier4 "#94e2d5"
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreknix/tmux-primary-ip'

# config catppucin color
if-shell '[ -f ~/.config/tmux/colors.conf ]' "source-file ~/.config/tmux/colors.conf"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_rosewater},fg=#{@thm_base},bold]  #S },#{#[bg=default,fg=#{@thm_rosewater},bold]  #S }}"
#set -ga status-left "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
#set -ga status-left "#[bg=default,fg=#{@thm_green},bold]  #{pane_current_command} "
#set -ga status-left "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
#set -ga status-left "#[bg=default,fg=#{@thm_blue},bold]   #{=/-10/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@thm_lavender},bold]  #{cpu_percentage} "
set -ga status-left "#[bg=default,fg=#{@thm_lavender},bold]  #(vm_stat | awk '/Pages free/{f=$3} /Pages active/{a=$3} /Pages inactive/{i=$3} /Pages wired down/{w=$4} /Pages speculative/{s=$3} END{printf \"%d\", (a+w)/(f+a+i+w+s)*100}')%% "
set -ga status-left "#[bg=default,fg=#{@thm_overlay0},none,bold]#{?window_zoomed_flag,|,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow},bold]#{?window_zoomed_flag,  zoom ,}"
set -ga status-left "#[bg=default,fg=#{@thm_overlay0},none,bold]#{?#{!=:#{client_key_table},root},|,}"
set -ga status-left "#[bg=default,fg=#{@thm_peach},bold]#{?#{!=:#{client_key_table},root},  #{client_key_table} ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
#set -ga status-right "#[bg=default,fg=#{@thm_lavender},bold]  #{cpu_percentage} "
#set -ga status-right "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
#set -ga status-right "#[bg=default,fg=#{@thm_pink},bold]  #(~/.config/tmux/plugins/tmux-mem-cpu-load/tmux-mem-cpu-load -i 2 -m 2 | awk \'{print substr($1, 1, 2)}\')%% "
#set -ga status-right "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
set -ga status-right "#[bg=default,fg=#{@thm_mauve},bold] 󰖩 #{primary_ip} "
#set -ga status-right "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
set -ga status-right "#{battery_color_charge_fg}#[bg=default]  #{battery_percentage} "
#set -ga status-right "#[bg=default,fg=#{@thm_overlay0},none,bold]|"
set -ga status-right "#[bg=default,fg=#{@thm_blue},bold] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# Configure Tmux
set -g status-position top
set -g detach-on-destroy off
set-hook -g session-closed "run-shell 'zsh -c \"source ~/.config/vulcanzsh/into-tmux.zsh && tmux_on_session_close\" > /dev/null 2>&1'"
#set -g status 2
set -g status-style "bg=default"
set -g status-justify "absolute-centre"
#set -g status-format[1] "#[align=left,bg=default,fg=#{@thm_sapphire},bold]  #{s|$HOME|~|:pane_current_path}"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format "\
#[align=left,fg=#{@thm_blue}]  #{s|$HOME|~|:pane_current_path} \
#[align=right,fg=#{@thm_sapphire}] #(cd #{pane_current_path} && git branch --show-current 2>/dev/null | sed 's/^/󰊢 /') \
#[fg=#{@thm_green}]\
#{?#{==:#{pane_current_command},zsh},,\
#{?#{==:#{pane_current_command},nvim},,\
#{?#{==:#{pane_current_command},spf},󰀶,\
#{?#{==:#{pane_current_command},bash},,\
#{?#{==:#{pane_current_command},ssh},,\
#{?#{==:#{pane_current_command},#(claude --version 2>/dev/null | awk '{print $1}')},󱙺,\
}}}}} \
#{pane_current_command} "
setw -g pane-border-style "bg=default,fg=#{@thm_overlay0}"
setw -g pane-active-border-style "bg=default,fg=#{@thm_blue}"
setw -g pane-border-lines double

# window content (number)
set -wg automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
set -g window-status-current-format "#[fg=#{@thm_sky}#,bg=default]#[fg=#{@thm_base}#,bg=#{@thm_sky}#,bold]#I#{?#{!=:#{window_name},window}, #[fg=#{@thm_text}#,bg=#{@thm_surface1}] #W#[fg=#{@thm_surface1}#,bg=default],#[fg=#{@thm_sky}#,bg=default]}"
set -g window-status-format "#{?window_bell_flag,#[fg=#{@thm_red}#,bg=default]#[fg=#{@thm_base}#,bg=#{@thm_red}#,bold]#I#{?#{!=:#{window_name},window}, #[fg=#{@thm_text}#,bg=#{@thm_surface1}] #W#[fg=#{@thm_surface1}#,bg=default],#[fg=#{@thm_red}#,bg=default]},#{?window_activity_flag,#[fg=#{@thm_peach}#,bg=default]#[fg=#{@thm_base}#,bg=#{@thm_peach}#,bold]#I#{?#{!=:#{window_name},window}, #[fg=#{@thm_text}#,bg=#{@thm_surface1}] #W#[fg=#{@thm_surface1}#,bg=default],#[fg=#{@thm_peach}#,bg=default]},#[fg=#{@thm_surface0}#,bg=default]#[fg=#{@thm_overlay1}#,bg=#{@thm_surface0}#,bold]#I#{?#{!=:#{window_name},window}, #[fg=#{@thm_overlay0}#,bg=#{@thm_surface1}] #W#[fg=#{@thm_surface1}#,bg=default],#[fg=#{@thm_surface0}#,bg=default]}}}"

set -g window-status-style "bg=default,fg=#{@thm_yellow}"
set -g window-status-last-style "bg=default,fg=#{@thm_yellow}"
set -g window-status-activity-style "bg=default,fg=default"
set -g window-status-bell-style "bg=default,fg=default,bold"
set -g window-status-current-style "bg=default,fg=default,bold"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay0}] "

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# ─── vim-tmux-navigator: remap from Ctrl+hjkl to Meta+hjkl ────────────────
# Run after tpm so we override the plugin's default Ctrl+hjkl bindings
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
unbind -n 'C-\'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?$'"
bind -n M-h if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind -n M-j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind -n M-k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind -n M-l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'
bind -n 'M-\' if-shell "$is_vim" 'send-keys M-\\' 'select-pane -l'
bind -T copy-mode-vi M-h select-pane -L
bind -T copy-mode-vi M-j select-pane -D
bind -T copy-mode-vi M-k select-pane -U
bind -T copy-mode-vi M-l select-pane -R
bind -T copy-mode-vi 'M-\' select-pane -l
